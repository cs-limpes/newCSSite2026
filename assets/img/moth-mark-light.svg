<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Charlene Slimp site mark, light</title>
  <desc id="desc">A minimal geometric moth silhouette over concentric rings in a light palette for dark backgrounds.</desc>

  <!-- concentric rings -->
  <circle cx="64" cy="64" r="36" stroke="#FEEEDF" stroke-opacity="0.42" stroke-width="1.6"/>
  <circle cx="64" cy="64" r="25" stroke="#588D93" stroke-opacity="0.82" stroke-width="1.6"/>
  <circle cx="64" cy="64" r="14" stroke="#FEEEDF" stroke-opacity="0.26" stroke-width="1.4"/>

  <!-- moth silhouette -->
  <g fill="#FEEEDF">
    <!-- body -->
    <path d="M64 46c2.8 0 5 2.2 5 5v7.5c0 2.3-.8 4.5-2.2 6.3l-2.8 3.3-2.8-3.3A9.9 9.9 0 0 1 59 58.5V51c0-2.8 2.2-5 5-5Z"/>
    <path d="M62.6 66.8h2.8l2.6 10.2c.5 2-1 3.9-3.1 3.9h-1.8c-2.1 0-3.6-1.9-3.1-3.9l2.6-10.2Z"/>

    <!-- upper wings -->
    <path d="M61.2 57.5c-7.9-7.5-19.7-9.3-31.6-5.2 3.1 7.3 8.5 12.8 15.5 15.9 6.5 2.9 12.7 2.6 17.4-.8-2.9-2.4-4.5-6-1.3-9.9Z"/>
    <path d="M66.8 57.5c7.9-7.5 19.7-9.3 31.6-5.2-3.1 7.3-8.5 12.8-15.5 15.9-6.5 2.9-12.7 2.6-17.4-.8 2.9-2.4 4.5-6 1.3-9.9Z"/>

    <!-- lower wings -->
    <path d="M60.8 66.7c-6.1.5-12.2 3.2-16.8 8.4 3 5.6 8.1 9.3 14.9 10.7 2.5.6 4.7-1.7 4-4.2l-2.1-7.4Z"/>
    <path d="M67.2 66.7c6.1.5 12.2 3.2 16.8 8.4-3 5.6-8.1 9.3-14.9 10.7-2.5.6-4.7-1.7-4-4.2l2.1-7.4Z"/>

    <!-- antennae -->
    <path d="M63 48.6c-.5-3.4-2.6-6.6-5.7-8.8" stroke="#FEEEDF" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M65 48.6c.5-3.4 2.6-6.6 5.7-8.8" stroke="#FEEEDF" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
